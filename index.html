<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>N69 Kemena Socioeconomic Dashboard Data 2020</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>SEPINTAS LALU STATISTIK SOSIOEKONOMI N.69 KEMENA</h1>

<div class="grid">

<div class="section">

<h2>Penduduk 2020</h2>

<div id="population" class="population-grid"></div>

</div>

<div class="section">

<h2>Kumpulan Etnik Warganegara (%)</h2>

<canvas id="ethnicityChart"></canvas>

</div>

<div class="section">

<h2>Struktur Umur (%)</h2>

<canvas id="ageChart"></canvas>

</div>

<div class="section">

<h2>Kemudahan Perkhidmatan (2022)</h2>

<div id="facilities" class="card-list"></div>

</div>

<div class="section">

<h2>Kesihatan (2020)</h2>

<div id="health" class="card-list"></div>

</div>

<div class="section">

<h2>Keselamatan Awam (2020)</h2>

<div id="safety" class="safety-grid"></div>

</div>

<div class="section">

<h2>Pendidikan (2020)</h2>

<div id="education" class="education-grid"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
