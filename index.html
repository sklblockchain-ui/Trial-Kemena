<!DOCTYPE html>
<html>

<head>

<title>N69 Kemena Socioeconomic Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>N69 Kemena Socioeconomic Dashboard</h1>

<div class="grid">

<div class="card">
<h2>Population Overview</h2>
<div id="population"></div>
</div>

<div class="card">
<h2>Ethnicity Distribution</h2>
<canvas id="ethnicityChart"></canvas>
</div>

<div class="card">
<h2>Age Structure</h2>
<canvas id="ageChart"></canvas>
</div>

<div class="card">
<h2>Education</h2>
<table id="educationTable"></table>
</div>

<div class="card">
<h2>Facilities</h2>
<table id="facilitiesTable"></table>
</div>

<div class="card">
<h2>Health Facilities</h2>
<table id="healthTable"></table>
</div>

<div class="card">
<h2>Public Safety</h2>
<table id="safetyTable"></table>
</div>

<div class="card">
<h2>Income</h2>
<table id="incomeTable"></table>
</div>

</div>

<script src="script.js"></script>

</body>

</html>
